<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <title>Admin & Payment Buttons</title>
  <style>
    footer{
        margin-top: 50vh;
        font-family: "Poppins", sans-serif;
        font-weight: 500;
        font-style: normal;
        font-size: smaller;
    }

    body {
        display: block;
        justify-items: center;
        align-items: center;
        font-family: "Poppins", sans-serif;
        font-weight: 500;
        font-style: normal;
        background-color: #fcfff1;
    }

    .button-container {
      display: block;
      gap: 1rem;
    }
    .btn {
      padding: 0.75rem 5rem;
      background-color: #42b983;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      text-decoration: none;
      text-align: center;
      transition: background-color 0.2s;
      display: block;
      margin-bottom: 3vh;
    }
    .btn:hover {
      background-color: #35495e;
    }
  </style>
