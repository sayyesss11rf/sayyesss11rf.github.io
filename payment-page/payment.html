<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100..900&display=swap" rel="stylesheet">
    <title>Payment Gateway</title>
</head>
<body>
    <div class="container-luar">
        <div class="container-dalam">
            <section class="header">
                <h1>Keranjang Belanja</h1>
            </section>
            <div class="payment-details">
                <h3>Detail Pesanan</h3>
                <form action="" method="post">
                    <div class="form-group">
                        <label for="name">Nama</label>
                        <input type="text" id="name" placeholder="Nama Anda">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="example@gmail.com">
                    </div>
                    <div class="form-group">
                        <label for="number">Kontak</label>
                        <input type="number" id="number" placeholder="6281122223333">
                    </div>
                    <div class="form-group">
                        <label for="catatan">Catatan Pesanan</label>
                        <input type="text" id="catatan" placeholder="Catatan ke penjual">
                    </div>
                    <div class="form-group">
                        <label for="alternatif">Email Alternatif (Opsional)</label>
                        <input type="email" id="alternatif" placeholder="example@gmail.com">
                    </div>
                    <div class="tombol">
                        <button type="submit">Order</button>
                        <button type="reset" class="batal">Reset</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <footer>
        <p>&copy; 2025 by PicknCart Team - rafiiee. All rights reserved.</p>
    </footer>
</body>
</html>
